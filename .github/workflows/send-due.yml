name: Send Due Notifications

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  call-api:
    runs-on: ubuntu-latest
    steps:
      - name: Call send-due endpoint
        run: |
          curl -i -X POST https://nextjs-boilerplate-wglk.onrender.com/send-due