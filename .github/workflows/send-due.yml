name: Send Due Notifications

on:
  schedule:
    - cron: "*/5 * * * *"   # Her 5 dakikada bir
  workflow_dispatch:

jobs:
  call-api:
    runs-on: ubuntu-latest
    steps:
      - name: Call send-due endpoint
        run: |
          curl -X POST https://nextjs-boilerplate-wglk.onrender.com/send-due